plugins:
  - tag: sequence_not_in_list_noleak
    type: sequence
    args:    
      - exec: drop_resp      #丢弃之前的请求结果   
      - exec: $sequence_google_node #表外域名先带ecs发到8888
      - matches: "!resp_ip 0.0.0.0/0 2000::/3"   #rcode 235及没有IP等情况
        exec: $sequence_google  #cf dns再查一次
      - matches:
        - "qtype 28"
        - "rcode 3"
        exec: $my_nov6list  #生成域名规则
      - matches:
        - "qtype 1"
        - "rcode 3"
        exec: $my_nov4list  #生成域名规则
      - matches: "rcode 3"   #没有域名
        exec: accept
      - matches: "rcode 2 5"   #失败或者拒绝
        exec: $sequence_local      #SERVFAIL用国内dns再查一次
      - matches:
        - "qtype 28"
        - "rcode 0 3"
        - "!resp_ip 2000::/3"
        exec: $my_nov6list  #生成域名规则
      - matches:
        - "qtype 1"
        - "rcode 0 3"
        - "!resp_ip 0.0.0.0/0"
        exec: $my_nov4list  #生成域名规则
      - matches: "rcode 2 3 5"   #失败或者拒绝
        exec: accept                      #实在没有ip就接受
      - matches: "!resp_ip 0.0.0.0/0 2000::/3"
        exec: accept                      #再没有IP返回就把结果返回给客户端
      - matches: "resp_ip $direct_ip"
        exec: mark 102
      - matches: mark 102
        exec: $my_realiplist
      - matches:    #国内域名发到mihomo
        - mark 102
        - switch9 'B'
        exec: $sequence_local_fake
      - matches: mark 102
        exec: accept
      - matches: "!resp_ip $geoip_cn"
        exec: mark 89 #标记
      - matches: mark 89
        exec: $sequence_fakeip
      - matches: mark 89
        exec: $my_fakeiplist
      - matches: "!mark 89"
        exec: $my_realiplist
      - matches:    #国内域名发到mihomo
        - "!mark 89"
        - switch9 'B'
        exec: $sequence_local_fake