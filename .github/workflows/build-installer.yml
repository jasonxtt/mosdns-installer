name: Build Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v5-tom-installer-*'
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: installer
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="v5-tom-installer-$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goamd64: v3
            suffix: linux-amd64-v3
          - os: linux
            arch: amd64
            goamd64: ""
            suffix: linux-amd64
          - os: linux
            arch: arm
            goarm: "5"
            suffix: linux-arm-5
          - os: linux
            arch: arm
            goarm: "6"
            suffix: linux-arm-6
          - os: linux
            arch: arm
            goarm: "7"
            suffix: linux-arm-7
          - os: linux
            arch: arm64
            goarm: ""
            suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build and package
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOAMD64: ${{ matrix.goamd64 }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
          VERSION: ${{ needs.version.outputs.VERSION }}
        run: |
          go build -ldflags="-s -w" -o mosdns-installer .
          tar -czvf "mosdns-installer-${{ matrix.suffix }}.tar.gz" mosdns-installer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosdns-installer-${{ matrix.suffix }}
          path: mosdns-installer-*.tar.gz
          retention-days: 30

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.VERSION }}
          name: Mosdns Installer ${{ needs.version.outputs.VERSION }}
          body: |
            Automatic build of mosdns installer.
            
            **Installation:**
            ```bash
            tar -xzvf mosdns-installer-linux-amd64.tar.gz
            chmod +x mosdns-installer
            sudo ./mosdns-installer
            ```
            
            **Available architectures:**
            - `mosdns-installer-linux-amd64-v3.tar.gz` - x86-64-v3 (AVX, BMI2 support required)
            - `mosdns-installer-linux-amd64.tar.gz` - x86-64 (standard)
            - `mosdns-installer-linux-arm-5.tar.gz` - ARMv5
            - `mosdns-installer-linux-arm-6.tar.gz` - ARMv6
            - `mosdns-installer-linux-arm-7.tar.gz` - ARMv7
            - `mosdns-installer-linux-arm64.tar.gz` - ARM64
            
            **Commands:**
            - `./mosdns-installer` - Auto install/reinstall
            - `./mosdns-installer install` - Fresh install
            - `./mosdns-installer reinstall` - Reinstall
            - `./mosdns-installer uninstall` - Uninstall
            - `./mosdns-installer version` - Show version
          draft: false
          prerelease: true
          files: artifacts/mosdns-installer-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
